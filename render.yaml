services:
  - type: web
    name: excel-auditor-v2
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
